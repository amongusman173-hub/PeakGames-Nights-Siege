<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#050810"/>
  <!-- Moon -->
  <circle cx="22" cy="8" r="5" fill="#c8d8ff"/>
  <circle cx="24.5" cy="6.5" r="4" fill="#050810"/>
  <!-- Ground -->
  <rect x="0" y="22" width="32" height="10" rx="0" fill="#0d1a08"/>
  <!-- Campfire logs -->
  <line x1="10" y1="26" x2="16" y2="22" stroke="#5a3a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="16" y2="22" stroke="#5a3a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fire glow (outer) -->
  <ellipse cx="16" cy="21" rx="5" ry="3" fill="rgba(255,100,0,0.3)"/>
  <!-- Fire orange -->
  <path d="M16 14 C14 17 12 19 13 22 C14 24 18 24 19 22 C20 19 18 17 16 14Z" fill="#ff6b00"/>
  <!-- Fire yellow core -->
  <path d="M16 16 C15 18 14 20 15 22 C15.5 23 16.5 23 17 22 C18 20 17 18 16 16Z" fill="#ffcc00"/>
  <!-- Fire white tip -->
  <circle cx="16" cy="17" r="1.5" fill="#fff9c4" opacity="0.8"/>
  <!-- Silhouette person -->
  <circle cx="8" cy="20" r="2" fill="rgba(0,0,0,0.7)"/>
  <rect x="6.5" y="22" width="3" height="4" rx="1" fill="rgba(0,0,0,0.7)"/>
</svg>
